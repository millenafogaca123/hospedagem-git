<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;

            /* IMAGEM DE FUNDO */
            background-image: url(background.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);

            padding: 40px;
            border-radius: 15px;

            display: flex;
            flex-direction: column;
            align-items: center;

            width: 320px;

            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h2 {
            background-image: url(gif.png);
            color: white;
            margin-bottom: 20px;
            padding: 20px 50px;
            border-radius: 10px;
            font-size: 24px;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;

            border: none;
            border-radius: 8px;

            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;

            border: none;
            border-radius: 8px;

            background-color: #007BFF;
            color: white;

            font-size: 16px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Login</h2>

        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">

        <button type="button" onclick="window.location.href='cadastro.html'">   Entrar</button>
    </div>
    
</body>
</html>
